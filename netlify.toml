# netlify.toml — Configuração do Netlify
# Documentação: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Publica toda a raiz do repositório como site estático
  publish = "."

[functions]
  # Pasta com as funções serverless (backend mínimo para OAuth)
  directory = "netlify/functions"

# Cabeçalhos de segurança para todas as páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    # Permite o login/APIs do Google (SSO + Sheets/Drive) e o OAuth do GitHub
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://sheets.googleapis.com https://api.github.com https://github.com; frame-src https://accounts.google.com; img-src 'self' data: https://*.googleusercontent.com https://avatars.githubusercontent.com; font-src 'self'"
